services:
  - type: web
    name: engineering-stores
    env: python
    buildCommand: pip install -r requirements.txt && flask db upgrade || flask db stamp head && flask seed-db || true
    startCommand: gunicorn run:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: engineering-stores-db
          property: connectionString
      - key: MAIL_SERVER
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: 587
      - key: MAIL_USE_TLS
        value: true
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_DEFAULT_SENDER
        sync: false
      - key: MAIL_SUPPRESS_SEND
        value: false
      - key: GLOBAL_NOTIFICATION_EMAILS
        sync: false
    healthCheckPath: /health
