{% extends "base.html" %}
{% block title %}Edit User - ESMS{% endblock %}
{% block page_title %}Edit User{% endblock %}

{% block content %}
<div class="page-header">
  <div class="page-header-left">
    <h1 class="page-header-title">Edit User</h1>
    <p class="page-header-subtitle">{{ user.full_name }}</p>
  </div>
  <div class="page-header-actions">
    <a href="{{ url_for('admin.users') }}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i> Back</a>
  </div>
</div>

<div class="row justify-content-center">
  <div class="col-md-8 col-lg-6">
    <div class="card-esms">
      <div class="card-header-esms"><h5 class="mb-0">Edit: {{ user.username }}</h5></div>
      <div class="card-body p-4">
        <form method="POST" action="{{ url_for('admin.edit_user', user_id=user.id) }}" novalidate data-loading>
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-3">
            <label class="form-label fw-semibold">Full Name <span class="text-danger">*</span></label>
            <input type="text" class="form-control" name="full_name" value="{{ user.full_name }}" required>
          </div>
          <div class="row g-3 mb-3">
            <div class="col-md-4">
              <label class="form-label fw-semibold">Email <span class="text-danger">*</span></label>
              <input type="email" class="form-control" name="email" value="{{ user.email }}" required>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Employee ID</label>
              <input type="text" class="form-control" name="employee_id" value="{{ user.employee_id or '' }}">
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Department</label>
              <input type="text" class="form-control" name="department" value="{{ user.department or '' }}">
            </div>
          </div>
          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label class="form-label fw-semibold">Role <span class="text-danger">*</span></label>
              <select class="form-select" name="role" required>
                {% for key, label in roles.items() %}
                <option value="{{ key }}" {{ 'selected' if user.role == key }}>{{ label }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Account Status</label>
              <div class="form-check form-switch mt-2">
                <input class="form-check-input" type="checkbox" name="is_active" id="isActive" {{ 'checked' if user.is_active }}>
                <label class="form-check-label" for="isActive">Active</label>
              </div>
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">New Password <small class="text-muted">(leave blank to keep current)</small></label>
            <input type="password" class="form-control" name="new_password" minlength="8" placeholder="Minimum 8 characters">
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i> Save Changes</button>
            <a href="{{ url_for('admin.users') }}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
