{% extends "base.html" %}
{% block title %}Create User - ESMS{% endblock %}
{% block page_title %}Create User{% endblock %}

{% block content %}
<div class="page-header">
  <div class="page-header-left">
    <h1 class="page-header-title">Create New User</h1>
    <p class="page-header-subtitle">Add a new user to the system</p>
  </div>
  <div class="page-header-actions">
    <a href="{{ url_for('admin.users') }}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i> Back</a>
  </div>
</div>

<div class="row justify-content-center">
  <div class="col-md-8 col-lg-6">
    <div class="card-esms">
      <div class="card-header-esms"><h5 class="mb-0">User Details</h5></div>
      <div class="card-body p-4">
        <form method="POST" action="{{ url_for('admin.create_user') }}" novalidate data-loading>
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-3">
            <label class="form-label fw-semibold">Full Name <span class="text-danger">*</span></label>
            <input type="text" class="form-control" name="full_name" required placeholder="e.g. Rajesh Kumar">
          </div>
          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label class="form-label fw-semibold">Username <span class="text-danger">*</span></label>
              <input type="text" class="form-control" name="username" required placeholder="e.g. rajesh.kumar">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Email <span class="text-danger">*</span></label>
              <input type="email" class="form-control" name="email" required placeholder="e.g. rajesh@company.com">
            </div>
          </div>
          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label class="form-label fw-semibold">Department</label>
              <input type="text" class="form-control" name="department" placeholder="e.g. Mechanical">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Role <span class="text-danger">*</span></label>
              <select class="form-select" name="role" required>
                <option value="">Select Role</option>
                {% for key, label in roles.items() %}
                <option value="{{ key }}">{{ label }}</option>
                {% endfor %}
              </select>
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Password <span class="text-danger">*</span></label>
            <input type="password" class="form-control" name="password" minlength="8" required placeholder="Minimum 8 characters">
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i> Create User</button>
            <a href="{{ url_for('admin.users') }}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
