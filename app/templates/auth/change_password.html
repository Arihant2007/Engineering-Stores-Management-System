{% extends "base.html" %}
{% block title %}Change Password - ESMS{% endblock %}
{% block page_title %}Change Password{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card card-esms">
      <div class="card-header-esms">
        <h5 class="mb-0"><i class="bi bi-key me-2"></i>Change Password</h5>
      </div>
      <div class="card-body p-4">
        <form method="POST" action="{{ url_for('auth.change_password') }}" novalidate>
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

          <div class="mb-3">
            <label for="current_password" class="form-label fw-semibold">Current Password</label>
            <input type="password" class="form-control" id="current_password" name="current_password" required>
          </div>
          <div class="mb-3">
            <label for="new_password" class="form-label fw-semibold">New Password</label>
            <input type="password" class="form-control" id="new_password" name="new_password" minlength="8" required>
            <div class="form-text">Minimum 8 characters.</div>
          </div>
          <div class="mb-4">
            <label for="confirm_password" class="form-label fw-semibold">Confirm New Password</label>
            <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Update Password</button>
            <a href="{{ url_for('main.dashboard') }}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
